<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointments</title>

<link rel="stylesheet" href="appointment.css">
</head>

<body>

<header>
  <button id="menuBtn">☰</button>
  <h2>Appointments</h2>

  <button id="settingsBtn">⚙️</button>
  <button id="notifBtn">🔔</button>
  <button id="profileBtn">👤</button>
</header>

<div class="controls">
  <input type="text" id="searchInput" placeholder="Search name, institute, time...">
  <div class="filter-container">
    <button id="filterBtn" aria-expanded="false">Filter ▾</button>
    <div id="filterPanel" class="filter-panel" hidden>
      <label for="dateFrom">Date from:</label>
      <input id="dateFrom" type="date">

      <label for="dateTo">Date to:</label>
      <input id="dateTo" type="date">

      <label for="instituteFilter">Institute:</label>
      <select id="instituteFilter">
        <option value="all">All</option>
        <option value="icsls">ICSLS</option>
      </select>

      <label for="timeFrom">Time from:</label>
      <input id="timeFrom" type="time">

      <label for="timeTo">Time to:</label>
      <input id="timeTo" type="time">

      <label for="statusFilter">Status:</label>
      <select id="statusFilter">
        <option value="all">All</option>
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
      </select>

      <button id="clearFilterBtn">Clear</button>
    </div>
  </div>
</div>

<div>
  <span>Date</span>
  <span>Name</span>
  <span>Institute</span>
  <span>Time</span>
  <span>Duration</span>
  <span>Status</span>
</div>

<div id="appointmentList">

  <h4>March 22, 2026</h4>

  <div class="card" data-date="2026-03-22">
    <span></span>
    <span class="name">Teacher 1</span>
    <span>ICSLS</span>
    <span>2:00PM - 2:20PM</span>
    <span>20 Minutes</span>
    <select class="status">
      <option>Pending</option>
      <option>Approved</option>
    </select>
  </div>

  <div class="card" data-date="2026-03-22">
    <span></span>
    <span class="name">Teacher 2</span>
    <span>ICSLS</span>
    <span>2:00PM - 2:20PM</span>
    <span>20 Minutes</span>
    <select class="status">
      <option>Pending</option>
      <option>Approved</option>
    </select>
  </div>

  <h4>March 23, 2026</h4>

  <div class="card" data-date="2026-03-23">
    <span></span>
    <span class="name">Teacher 3</span>
    <span>ICSLS</span>
    <span>2:00PM - 2:20PM</span>
    <span>20 Minutes</span>
    <select class="status">
      <option>Approved</option>
      <option>Pending</option>
    </select>
  </div>

</div>

<script>

const menuBtn = document.getElementById("menuBtn");
const settingsBtn = document.getElementById("settingsBtn");
const notifBtn = document.getElementById("notifBtn");
const profileBtn = document.getElementById("profileBtn");
const filterBtn = document.getElementById("filterBtn");
const filterPanel = document.getElementById("filterPanel");
const statusFilter = document.getElementById("statusFilter");
const instituteFilter = document.getElementById("instituteFilter");
const dateFrom = document.getElementById("dateFrom");
const dateTo = document.getElementById("dateTo");
const timeFrom = document.getElementById("timeFrom");
const timeTo = document.getElementById("timeTo");
const clearFilterBtn = document.getElementById("clearFilterBtn");
const searchInput = document.getElementById("searchInput");

menuBtn.onclick = () => alert("Menu clicked");
settingsBtn.onclick = () => alert("Settings clicked");
notifBtn.onclick = () => alert("Notifications clicked");
profileBtn.onclick = () => alert("Profile clicked");

filterBtn.onclick = () => {
  const isOpen = filterPanel.classList.toggle("open");

  if (isOpen) {
    filterPanel.removeAttribute("hidden");
    filterBtn.textContent = "Filter ▲";
    filterBtn.setAttribute("aria-expanded", "true");
  } else {
    filterPanel.classList.remove("open");
    filterPanel.setAttribute("hidden", "true");
    filterBtn.textContent = "Filter ▾";
    filterBtn.setAttribute("aria-expanded", "false");
  }
};

clearFilterBtn.onclick = () => {
  statusFilter.value = "all";
  instituteFilter.value = "all";
  dateFrom.value = "";
  dateTo.value = "";
  timeFrom.value = "";
  timeTo.value = "";
  searchInput.value = "";
  applyFilters();
};

function applyFilters() {
  const searchText = searchInput.value.trim().toLowerCase();
  const statusSelected = statusFilter.value;
  const instituteSelected = instituteFilter.value;
  const dateFromValue = dateFrom.value;
  const dateToValue = dateTo.value;
  const timeFromValue = timeFrom.value;
  const timeToValue = timeTo.value;

  function parseLocalTime(t) {
    const [h, m] = t.split(":").map(Number);
    return h * 60 + m;
  }

  function parseCardTime(timeText) {
    const parts = timeText.split("-").map(s => s.trim());
    if (!parts[0]) return null;
    let match = parts[0].match(/(\d{1,2}:\d{2})(AM|PM)/i);
    if (!match) return null;
    let [_, baseTime, ampm] = match;
    let [h, m] = baseTime.split(":").map(Number);
    if (/pm/i.test(ampm) && h < 12) h += 12;
    if (/am/i.test(ampm) && h === 12) h = 0;
    return h * 60 + m;
  }

  document.querySelectorAll(".card").forEach(card => {
    const name = card.querySelector(".name").textContent.toLowerCase();
    const institute = card.children[2].textContent.toLowerCase();
    const timeText = card.children[3].textContent.trim();
    const duration = card.children[4].textContent.toLowerCase();
    const status = card.querySelector(".status").value.toLowerCase();
    const cardDate = card.dataset.date || "";
    const cardTime = parseCardTime(timeText);

    const matchesSearch =
      searchText === "" ||
      name.includes(searchText) ||
      institute.includes(searchText) ||
      timeText.toLowerCase().includes(searchText) ||
      duration.includes(searchText);

    const matchesStatus =
      statusSelected === "all" ||
      status === statusSelected;

    const matchesInstitute =
      instituteSelected === "all" ||
      institute === instituteSelected;

    const matchesDateFrom =
      dateFromValue === "" ||
      (cardDate !== "" && cardDate >= dateFromValue);

    const matchesDateTo =
      dateToValue === "" ||
      (cardDate !== "" && cardDate <= dateToValue);

    const matchesTimeFrom =
      timeFromValue === "" ||
      (cardTime !== null && cardTime >= parseLocalTime(timeFromValue));

    const matchesTimeTo =
      timeToValue === "" ||
      (cardTime !== null && cardTime <= parseLocalTime(timeToValue));

    card.style.display =
      matchesSearch &&
      matchesStatus &&
      matchesInstitute &&
      matchesDateFrom &&
      matchesDateTo &&
      matchesTimeFrom &&
      matchesTimeTo
      ? "grid"
      : "none";
  });
}

searchInput.addEventListener("keyup", applyFilters);
statusFilter.addEventListener("change", applyFilters);
instituteFilter.addEventListener("change", applyFilters);
dateFrom.addEventListener("change", applyFilters);
dateTo.addEventListener("change", applyFilters);
timeFrom.addEventListener("change", applyFilters);
timeTo.addEventListener("change", applyFilters);

function updateStatusColors() {
  document.querySelectorAll(".status").forEach(select => {
    if (select.value.toLowerCase() === "approved") {
      select.style.backgroundColor = "#4caf50";
      select.style.color = "white";
    } else {
      select.style.backgroundColor = "#f5a623";
      select.style.color = "black";
    }
  });
}

updateStatusColors();

// keep color up-to-date whenever status changes
document.querySelectorAll(".status").forEach(select => {
  select.addEventListener("change", function () {
    console.log("Status changed to:", this.value);
    updateStatusColors();
    applyFilters();
  });
});

</script>

</body>
</html>
